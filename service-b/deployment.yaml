apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: service-b
        image: shamsmo0h/service-b:latest
        ports:
        - containerPort: 8082
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: service-b-svc
spec:
  selector:
    app: service-b
  ports:
  - port: 80
    targetPort: 8082
  type: ClusterIP